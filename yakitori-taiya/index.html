<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炭火焼鳥 たい家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-container">
        <h1 class="logo">たい家</h1>
        </div>
    <div class="hero-visual">
        <div class="hero-text">
           <p>こだわりの備長炭、<br class="sp-only">至福の一本。</p>
        </div>
    </div>
</header>

    <nav>
        <ul>
            <li><a href="#menu">お品書き</a></li>
            <li><a href="#kodawari">こだわり</a></li>
            <li><a href="#access">アクセス</a></li>
        </ul>
    </nav>

    <main>
      <section id="menu">
         <h2>お品書き</h2>
       <div class="menu-container">
         <div class="menu-image">
            <img src="yakitori.jpg" alt="自慢の焼き鳥">
         </div>

         <div class="menu-grid">
            <div class="menu-item">
                <span>ねぎま（タレ・塩）</span>
                <span class="price">180円</span>
            </div>
            <div class="menu-item">
                <span>つくね</span>
                <span class="price">250円</span>
            </div>
            <div class="menu-item">
                <span>軟骨</span>
                <span class="price">180円</span>
            </div>
         </div>
        </div>
      </section>

<section id="kodawari">
    <h2>こだわり</h2>
    <div class="kodawari-container">
        
        <div class="kodawari-text">
            <p>
                当店では紀州産備長炭を使い、<br>
                素材の旨みを逃さぬよう、<br>
                香ばしく、ふっくらと、一本一本、<br>
                最適な焼き加減に仕上げています。
            </p>
        </div>

        <div class="menu-image">
            <img src="kodawari.jpg" alt="こだわりの備長炭">
        </div>

    </div>
</section>

<section id="access">
    <h2>アクセス</h2>
    <div class="access-container">
        <div class="access-map">
            <div class="map-placeholder">MAP準備中</div>
        </div>

        <div class="access-info">
            <dl>
                <dt>住所</dt>
                <dd>〒000-0000<br>大阪府〇〇区〇〇町 1-2-3</dd>
                
                <dt>電話番号</dt>
                <dd class="tel">06-0000-0000</dd>
                
                <dt>営業時間</dt>
                <dd>17:00 〜 23:00（L.O. 22:30）</dd>
                
                <dt>定休日</dt>
                <dd>毎週月曜日、第二日曜日</dd>
            </dl>
            <div class="reserve-area">
                <a href="tel:0300000000" class="btn-reserve">お電話でのご予約はこちら</a>
            </div>
        </div>
    </div>
</section>


    </main>

    <footer>
        <p>2025 炭火焼鳥 たい家</p>
    </footer>

</body>
</html>
