<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>送信完了 | たいさん Web制作</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .thanks-container {
      max-width: 600px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 30px;
      color: #444;
    }

    .cta-button {
      display: inline-block;
      padding: 14px 32px;
      background-color: #ff7a00;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      transition: 0.3s;
    }

    .cta-button:hover {
      background-color: #111;
      transform: translateY(-3px);
    }
  </style>
</head>

<body>
  <div class="thanks-container">
    <h1>お問い合わせありがとうございます。</h1>

    <p>
      内容を確認のうえ、通常24時間以内にご返信いたします。<br>
      万が一返信が届かない場合は、迷惑メールフォルダをご確認ください。
    </p>

    <a href="index.html" class="cta-button">トップページへ戻る</a>
  </div>
</body>
</html>
